<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Immy's Big Performance</title>
<link href="https://fonts.googleapis.com/css2?family=Patrick+Hand&display=swap" rel="stylesheet" />
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Patrick Hand', cursive;
    background: linear-gradient(135deg, #fef9f0 0%, #f0f7ff 50%, #f9f0fe 100%);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 16px;
    user-select: none;
  }
  #book {
    width: 100%;
    max-width: 860px;
    background: #fff;
    border-radius: 20px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.12), 0 4px 16px rgba(0,0,0,0.08);
    overflow: hidden;
    position: relative;
    animation: fadeIn 0.5s ease;
  }
  #spine {
    position: absolute; left: 50%; top: 0; bottom: 0;
    width: 3px; background: rgba(0,0,0,0.04); pointer-events: none; z-index: 10;
  }
  #illustration { width: 100%; aspect-ratio: 800/480; position: relative; }
  #illustration svg { display: block; width: 100%; height: 100%; }
  #narration {
    padding: 20px 32px 16px;
    border-top: 2px solid #f5f0e8;
    font-size: clamp(13px, 2vw, 16px);
    line-height: 1.7;
    color: #3d2b1f;
    font-weight: 600;
  }
  #controls {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 24px 20px;
    gap: 12px;
  }
  #centre {
    display: flex; flex-direction: column;
    align-items: center; gap: 10px; flex: 1;
  }
  .nav-btn {
    width: 48px; height: 48px; border-radius: 50%;
    border: none; font-size: 22px; cursor: pointer;
    background: #82c341; color: #fff;
    box-shadow: 0 4px 12px rgba(130,195,65,0.4);
    transition: all 0.2s;
  }
  .nav-btn:disabled { background: #f0f0f0; color: #ccc; box-shadow: none; cursor: default; }
  #read-btn {
    padding: 10px 28px; border-radius: 30px; border: none;
    background: linear-gradient(135deg, #5dade2, #3a8fd8);
    color: #fff; font-size: 15px; font-weight: 800;
    font-family: 'Patrick Hand', cursive;
    cursor: pointer; letter-spacing: 0.5px;
    box-shadow: 0 4px 14px rgba(93,173,226,0.45);
    transition: background 0.2s;
    min-width: 140px;
  }
  #read-btn.loading { background: #d0d0d0; color: #999; box-shadow: none; cursor: default; }
  #read-btn.playing {
    background: linear-gradient(135deg, #e07a40, #c85a20);
    box-shadow: 0 4px 14px rgba(224,122,64,0.4);
    animation: pulse 1.2s infinite;
  }
  #dots { display: flex; gap: 6px; }
  .dot {
    height: 8px; border-radius: 4px;
    background: #d0e8c0; cursor: pointer;
    transition: all 0.3s;
  }
  .dot.active { background: #82c341; width: 20px !important; }
  #error-msg {
    padding: 6px 32px; background: #fff0f0;
    font-size: 12px; color: #c0392b; display: none;
  }
  #footer { margin-top: 12px; font-size: 12px; color: #bbb; }
  @keyframes fadeIn { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }
  @keyframes floatIn { from { opacity:0; transform:translateY(-14px); } to { opacity:1; transform:translateY(0); } }
  @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.85;transform:scale(0.97)} }
</style>
</head>
<body>

<div id="book">
  <div id="spine"></div>
  <div id="illustration"></div>
  <div id="narration"></div>
  <div id="error-msg"></div>
  <div id="controls">
    <button class="nav-btn" id="prev-btn" onclick="goPrev()">&#8249;</button>
    <div id="centre">
      <button id="read-btn" onclick="handleReadBtn()">Read to me</button>
      <div id="dots"></div>
    </div>
    <button class="nav-btn" id="next-btn" onclick="goNext()">&#8250;</button>
  </div>
</div>
<p id="footer">Immy's Big Performance &mdash; click arrows or swipe to turn pages</p>

<script>
// ── Audio ─────────────────────────────────────────────────────────────────────
const PAGE_AUDIO = [
  "audio/Page1.mp3",
  "audio/Page2.mp3",
  "audio/Page3.mp3",
  "audio/Page4.mp3",
  "audio/Page5.mp3",
  "audio/Page6.mp3",
  "audio/Page7.mp3",
  "audio/Page8.mp3",
];

let currentAudio = null;

function stopAudio() {
  if (currentAudio) {
    currentAudio.pause();
    currentAudio.currentTime = 0;
    currentAudio = null;
  }
}

function speak() {
  stopAudio();
  const src = PAGE_AUDIO[pageIndex];
  if (!src) return;
  setReadBtn("loading");
  showError("");
  const audio = new Audio(src);
  currentAudio = audio;
  audio.addEventListener("canplay", () => setReadBtn("playing"));
  audio.addEventListener("ended", () => { currentAudio = null; setReadBtn("idle"); });
  audio.addEventListener("error", () => {
    showError("Could not load audio file: " + src);
    currentAudio = null;
    setReadBtn("idle");
  });
  audio.play();
}

// ── State ─────────────────────────────────────────────────────────────────────
let pageIndex = 0;
let isPlaying = false;

function setReadBtn(state) {
  const btn = document.getElementById("read-btn");
  btn.className = "";
  if (state === "loading") { btn.classList.add("loading"); btn.textContent = "Loading..."; isPlaying = false; }
  else if (state === "playing") { btn.classList.add("playing"); btn.textContent = "Stop"; isPlaying = true; }
  else { btn.textContent = "Read to me"; isPlaying = false; }
}

function showError(msg) {
  const el = document.getElementById("error-msg");
  el.textContent = msg;
  el.style.display = msg ? "block" : "none";
}

function handleReadBtn() {
  if (isPlaying) { stopAudio(); setReadBtn("idle"); return; }
  speak();
}

function goNext() {
  if (pageIndex >= PAGES.length - 1) return;
  stopAudio(); setReadBtn("idle");
  pageIndex++;
  render();
}

function goPrev() {
  if (pageIndex <= 0) return;
  stopAudio(); setReadBtn("idle");
  pageIndex--;
  render();
}

function goToPage(i) {
  stopAudio(); setReadBtn("idle");
  pageIndex = i;
  render();
}

// ── Render ────────────────────────────────────────────────────────────────────
function render() {
  const page = PAGES[pageIndex];

  // Illustration
  document.getElementById("illustration").innerHTML = page.svg;

  // Narration
  document.getElementById("narration").textContent = page.narration;

  // Nav buttons
  document.getElementById("prev-btn").disabled = pageIndex === 0;
  document.getElementById("next-btn").disabled = pageIndex === PAGES.length - 1;

  // Dots
  const dotsEl = document.getElementById("dots");
  dotsEl.innerHTML = PAGES.map((_, i) =>
    `<div class="dot ${i === pageIndex ? 'active' : ''}" style="width:${i === pageIndex ? 20 : 8}px" onclick="goToPage(${i})"></div>`
  ).join("");

  // Error
  showError("");
}

// ── Swipe support ─────────────────────────────────────────────────────────────
let swipeStartX = null;
const book = document.getElementById("book");
book.addEventListener("touchstart", e => { if (e.touches.length) swipeStartX = e.touches[0].clientX; });
book.addEventListener("touchend", e => {
  if (swipeStartX === null) return;
  const diff = swipeStartX - (e.changedTouches[0]?.clientX ?? swipeStartX);
  if (Math.abs(diff) > 50) { diff > 0 ? goNext() : goPrev(); }
  swipeStartX = null;
});

// ── SVG helpers ───────────────────────────────────────────────────────────────
// Colour palette
const C = {

  return `<defs>
    <radialGradient id="${id}bg1" cx="20%" cy="30%" r="60%"><stop offset="0%" stop-color="${c1}" stop-opacity="0.5"/><stop offset="100%" stop-color="#fff" stop-opacity="0"/></radialGradient>
    <radialGradient id="${id}bg2" cx="80%" cy="70%" r="50%"><stop offset="0%" stop-color="${c2}" stop-opacity="0.4"/><stop offset="100%" stop-color="#fff" stop-opacity="0"/></radialGradient>
    <radialGradient id="${id}bg3" cx="50%" cy="20%" r="40%"><stop offset="0%" stop-color="${c3}" stop-opacity="0.3"/><stop offset="100%" stop-color="#fff" stop-opacity="0"/></radialGradient>
  </defs>
  <rect width="800" height="480" fill="#fff"/>
  <rect width="800" height="480" fill="url(#${id}bg1)"/>
  <rect width="800" height="480" fill="url(#${id}bg2)"/>
  <rect width="800" height="480" fill="url(#${id}bg3)"/>`;
}

function svgOpen() { return `<svg viewBox="0 0 800 480" width="100%" height="100%" xmlns="http://www.w3.org/2000/svg" style="font-family:'Patrick Hand',cursive">`; }

  if (glasses) s += `<circle cx="-6" cy="-14" r="5" fill="none" stroke="#8B6914" stroke-width="1.5"/>
    <circle cx="6" cy="-14" r="5" fill="none" stroke="#8B6914" stroke-width="1.5"/>
    <line x1="-1" y1="-14" x2="1" y2="-14" stroke="#8B6914" stroke-width="1.5"/>
    <line x1="-11" y1="-14" x2="-15" y2="-12" stroke="#8B6914" stroke-width="1"/>
    <line x1="11" y1="-14" x2="15" y2="-12" stroke="#8B6914" stroke-width="1"/>`;
  s += `</g>`;
  return s;
}

function childBudgies() {
  const kids = [
